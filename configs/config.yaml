# Model
model: deeplabv3plus
backbone: resnet50
num_classes: 21
pretrained_encoder: true

# Data
dataset: voc
data_root: data/VOCdevkit
image_size: 448       # was 512 — saves ~24% compute per batch
ignore_index: 255
num_workers: 2        # was 0 — carefully try 2 on M1

# Training
batch_size: 8         # was 6 — safe to bump now we know MPS isn't OOMing
epochs: 50
learning_rate: 0.0001
weight_decay: 0.0001
lr_scheduler: poly

# Device
device: mps

# Logging & Checkpoints
log_dir: results/metrics
checkpoint_dir: weights
save_best_only: true
log_every_n_epochs: 2